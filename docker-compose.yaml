version: "3.8"

services:

  postgres:
    image: postgres:latest
    container_name: poseidon-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    command:
      - postgres
      - -c
      - wal_level=logical
    volumes:
      - poseidon-postgres-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - phoebe-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: poseidon-pgadmin
    ports:
      - "${PGADMIN_PORT:-58080}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      - postgres
    volumes:
      - poseidon-pgadmin-data:/var/lib/pgadmin
    networks:
      - phoebe-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: poseidon-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - poseidon-zookeeper-data:/var/lib/zookeeper/data
    networks:
      - phoebe-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: poseidon-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: ${KAFKA_LISTENERS:-PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME:-PLAINTEXT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TOPICS: ${KAFKA_TOPICS:-crewing-audit-logs-topic-dev,surveys-audit-log-topic-dev,task-audit-log-topic-dev,gl-notifications-stg}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-1}
      KAFKA_TOPIC_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
    entrypoint: >
      sh -ec '
        /etc/confluent/docker/run &
        kafka_pid=$$!
        echo "Waiting for Kafka at localhost:9092..."
        until kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1; do
          if ! kill -0 $$kafka_pid 2>/dev/null; then
            echo "Kafka process exited before becoming ready"
            exit 1
          fi
          sleep 2
        done
        echo "Creating topics: $$KAFKA_TOPICS"
        OLDIFS="$$IFS"; IFS=","
        for topic in $$KAFKA_TOPICS; do
          if [ -n "$$topic" ]; then
            kafka-topics --create --if-not-exists \
              --topic "$$topic" \
              --bootstrap-server localhost:9092 \
              --partitions "$$KAFKA_TOPIC_PARTITIONS" \
              --replication-factor "$$KAFKA_TOPIC_REPLICATION_FACTOR"
          fi
        done
        IFS="$$OLDIFS"
        wait $$kafka_pid
      '
    volumes:
      - poseidon-kafka-data:/var/lib/kafka/data
    networks:
      - phoebe-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: poseidon-kafka-ui
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT:-58081}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_UI_BOOTSTRAP_SERVERS:-kafka:29092}
    volumes:
      - poseidon-kafka-ui-data:/data
    networks:
      - phoebe-network

  argo-db-app:
    image: sbtscala/scala-sbt:eclipse-temurin-17.0.15_6_1.12.5_2.13.18
    container_name: argo-db-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/postgres}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      ARGO_DB_BRANCH: ${ARGO_DB_BRANCH:-master}
    working_dir: /argo.db
    entrypoint: >
      sh -c "
        BRANCH=\"$${ARGO_DB_BRANCH:-master}\";
        if [ ! -d .git ]; then
          git clone --branch \"$$BRANCH\" git@github.com:Marlow-Navigation/argo.db.git /argo.db;
        else
          git fetch origin \"$$BRANCH\" &&
          git checkout \"$$BRANCH\" &&
          git pull origin \"$$BRANCH\";
        fi &&
        STATUS_FILE=/tmp/migration-status &&
        rm -f \"$$STATUS_FILE\" &&
        printf 'run --environment dev --action migrate\nexit\n' |
          sbt 2>&1 |
          while IFS= read -r line; do
            echo \"$$line\";
            case \"$$line\" in
              *'[success] Total time:'*) echo success > \"$$STATUS_FILE\" ;;
            esac
          done;
        STATUS=\"$$(cat $$STATUS_FILE 2>/dev/null)\";
        [ \"$$STATUS\" = success ]
      "
    volumes:
      - argo-db-data:/argo.db
      - ${HOME}/.ssh:/root/.ssh:ro
    networks:
      - phoebe-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: poseidon-jaeger
    profiles:
      - tracing
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_PORT:-4318}:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - phoebe-network

  alcyone-api:
    image: alcyone-api:latest
    container_name: poseidon-alcyone-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${ALCYONE_PORT:-8081}:8081"
    env_file:
      - ./.env
      - ./alcyone.env
    environment:
      # Keep container-safe defaults even when alcyone.env is host-oriented.
      DB_URL: ${ALCYONE_DB_URL:-jdbc:postgresql://postgres:5432/postgres}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: ${ALCYONE_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      PORT: ${ALCYONE_PORT:-8081}
      OTEL_JAVAAGENT_ENABLED: ${OTEL_JAVAAGENT_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-alcyone-api-compose}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-none}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      OTEL_TRACES_SAMPLER_ARG: ${TRACING_SAMPLING_PROBABILITY:-1.0}
    networks:
      - phoebe-network

  # ─── Phoebe Services (profile: phoebe) ───────────────────────────────────────

  phoebe-crewing:
    image: phoebe-crewing:latest
    container_name: poseidon-phoebe-crewing
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_CREWING_PORT:-8090}:8080"
    env_file:
      - ./.env
      - ./phoebe-crewing.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TASK_MANAGEMENT_URL: http://phoebe-task-management:8080
      DOCUMENT_SERVICE_URL: http://phoebe-document:8080
    networks:
      - phoebe-network

  phoebe-training:
    image: phoebe-training:latest
    container_name: poseidon-phoebe-training
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_TRAINING_PORT:-8091}:8080"
    env_file:
      - ./.env
      - ./phoebe-training.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CREWING_URL: http://phoebe-crewing:8080
    networks:
      - phoebe-network

  phoebe-document:
    image: phoebe-document:latest
    container_name: poseidon-phoebe-document
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_DOCUMENT_PORT:-8092}:8080"
    env_file:
      - ./.env
      - ./phoebe-document.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CREWING_URL: http://phoebe-crewing:8080
    networks:
      - phoebe-network

  phoebe-task-management:
    image: phoebe-task-management:latest
    container_name: poseidon-phoebe-task-management
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_TASK_MANAGEMENT_PORT:-8093}:8080"
    env_file:
      - ./.env
      - ./phoebe-task-management.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CREWING_URL: http://phoebe-crewing:8080
    networks:
      - phoebe-network

  phoebe-audit-logs:
    image: phoebe-audit-logs:latest
    container_name: poseidon-phoebe-audit-logs
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_AUDIT_LOGS_PORT:-8094}:8080"
    env_file:
      - ./.env
      - ./phoebe-audit-logs.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - phoebe-network

  phoebe-user-management:
    image: phoebe-user-management:latest
    container_name: poseidon-phoebe-user-management
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_USER_MANAGEMENT_PORT:-8095}:8080"
    env_file:
      - ./.env
      - ./phoebe-user-management.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    networks:
      - phoebe-network

  phoebe-imports:
    image: phoebe-imports:latest
    container_name: poseidon-phoebe-imports
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_IMPORTS_PORT:-8096}:8080"
    env_file:
      - ./.env
      - ./phoebe-imports.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CREWING_URL: http://phoebe-crewing:8080
    networks:
      - phoebe-network

  phoebe-insurance:
    image: phoebe-insurance:latest
    container_name: poseidon-phoebe-insurance
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_INSURANCE_PORT:-8097}:8080"
    env_file:
      - ./.env
      - ./phoebe-insurance.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INTEGRATION_CLIENT_URL: http://phoebe-integration-client:8080
      CREWING_URL: http://phoebe-crewing:8080
    networks:
      - phoebe-network

  phoebe-integration-client:
    image: phoebe-integration-client:latest
    container_name: poseidon-phoebe-integration-client
    profiles:
      - phoebe
    depends_on:
      postgres:
        condition: service_healthy
      argo-db-app:
        condition: service_completed_successfully
    ports:
      - "${PHOEBE_INTEGRATION_CLIENT_PORT:-8098}:8080"
    env_file:
      - ./.env
      - ./phoebe-integration-client.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/postgres
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    networks:
      - phoebe-network

volumes:
  poseidon-postgres-data:
  poseidon-pgadmin-data:
  poseidon-zookeeper-data:
  poseidon-kafka-data:
  poseidon-kafka-ui-data:
  argo-db-data:

networks:
  phoebe-network:
    driver: bridge
